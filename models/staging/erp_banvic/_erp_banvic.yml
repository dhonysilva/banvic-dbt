
sources:
  - name: erp
    description: Banvic's ERP with Client, Colaborators, Accounts and Transaction's data
    schema: erp_banvic
    
    tables:
      - name: agencias
        description: agencias' data
        columns:
          - name: cod_agencia
            description: Chave Primária da tabela agencias
            data_tests:
              - unique
              - not_null
      - name: localidades
        description: localidades' data
        columns:
          - name: cod_localidade
            description: Chave Primária da tabela localidades
            data_tests:
              - unique
              - not_null

      - name: clientes
        description: clientes' data
        columns:
          - name: cod_cliente
            description: Chave Primária da tabela clientes
            data_tests:
              - unique
              - not_null
      - name: colaboradores
        description: colaboradores' data
        columns:
          - name: cod_colaborador
            description: Chave Primária da tabela colaboradores
            data_tests:
              - unique
              - not_null

      - name: colaborador_agencia
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - cod_colaborador
                  - cod_agencia

      - name: contas
        description: Tabela que registra as informações das contas bancárias dos clientes, incluindo número da conta, agência, saldo, tipo de conta e data de abertura.
        columns:
          - name: num_conta
            data_tests:
              - unique 
              - not_null